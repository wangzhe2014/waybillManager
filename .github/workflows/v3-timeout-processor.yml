name: V3 Timeout Processor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-timeouts:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call V3 timeout processor
        env:
          V3_TIMEOUT_URL: ${{ secrets.V3_TIMEOUT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$V3_TIMEOUT_URL" ]; then
            echo "V3_TIMEOUT_URL secret is not configured."
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not configured."
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "$V3_TIMEOUT_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data '{"trigger":"github-actions"}'
